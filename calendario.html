<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario | Sangre Carbayona</title>
    <link rel="stylesheet" href="css/styles.css?nocache=20251231v24">
    <link rel="stylesheet" href="css/calendario.css?nocache=20260101v1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <img src="https://i.postimg.cc/mD797S9G/Logo-Web.png" alt="Sangre Carbayona">
                </a>
                <nav class="main-nav" id="mainNav">
                    <ul>
                        <li><a href="index.html">Inicio</a></li>
                        <li><a href="noticias.html">Noticias</a></li>
                        <li><a href="calendario.html" class="active">Calendario</a></li>
                        <li><a href="plantilla.html">Plantilla</a></li>
                        <li><a href="estadio.html">Estadio</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="cal-hero">
            <div class="container">
                <div class="cal-hero-content">
                    <h1 class="cal-title">Calendario Oficial</h1>
                    
                    <div class="cal-stats-grid">
                        <div class="cal-stat-item">
                            <div class="cal-stat-num" id="calStatJugados">0</div>
                            <div class="cal-stat-label">Jugados</div>
                        </div>
                        <div class="cal-stat-item">
                            <div class="cal-stat-num" id="calStatVictorias" style="color: #00c853;">0</div>
                            <div class="cal-stat-label">Victorias</div>
                        </div>
                        <div class="cal-stat-item">
                            <div class="cal-stat-num" id="calStatEmpates" style="color: #ffcc00;">0</div>
                            <div class="cal-stat-label">Empates</div>
                        </div>
                        <div class="cal-stat-item">
                            <div class="cal-stat-num" id="calStatDerrotas" style="color: #ff3d00;">0</div>
                            <div class="cal-stat-label">Derrotas</div>
                        </div>
                        <div class="cal-stat-item">
                            <div class="cal-stat-num" id="calStatPendientes">0</div>
                            <div class="cal-stat-label">Pendientes</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="cal-content-section">
            <div class="container">
                <div class="cal-filters">
                    <button class="cal-filter-btn active" data-filter="todos">Todos</button>
                    <button class="cal-filter-btn" data-filter="casa">En Casa</button>
                    <button class="cal-filter-btn" data-filter="fuera">Fuera</button>
                </div>
                <div class="matches-list" id="calendarioList"></div>
            </div>
        </section>
    </main>

    <script src="js/i18n.js"></script>
    <script src="js/script.js"></script>
    <script src="js/clasificacion.js"></script>
    <script src="js/calendario.js"></script>
</body>
</html>
